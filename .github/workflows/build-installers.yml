name: Build Multi-Platform Installers

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  MAVEN_VERSION: '3.9.6'

jobs:
  # Build Windows EXE installer
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
      
      - name: Install WiX Toolset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "C:\wix" -Force
          Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip" -OutFile "C:\wix\wix.zip"
          Expand-Archive -Path "C:\wix\wix.zip" -DestinationPath "C:\wix" -Force
          echo "C:\wix" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run Checkstyle
        run: mvn checkstyle:check

      - name: Build Windows EXE
        run: |
          mvn clean package -DskipTests -Pwindows-installer
          
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v7
        with:
          name: DailyDash-Windows-Installer
          path: target/dist/*.exe
          
      - name: Upload Windows MSI
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: DailyDash-Windows-MSI
          path: target/dist/*.msi

  # Build macOS DMG
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check

      - name: Build macOS DMG
        run: |
          mvn clean package -DskipTests -Pmacos
          
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v7
        with:
          name: DailyDash-macOS-DMG
          path: target/dist/*.dmg

  # Build Linux DEB
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot binutils
          
      - name: Build Linux DEB
        run: |
          mvn clean package -DskipTests -Plinux
          
      - name: Upload Linux DEB
        uses: actions/upload-artifact@v7
        with:
          name: DailyDash-Linux-DEB
          path: target/dist/*.deb

  # Build Android APK (requires GraalVM + Android SDK)
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'graalvm-community'
          native-image-job-reports: true
          cache: 'maven'
      
      - name: Build Android APK
        run: |
          mvn clean package -Pandroid -DskipTests
          
      - name: Upload Android APK
        uses: actions/upload-artifact@v7
        with:
          name: DailyDash-Android-APK
          path: target/gluonfx/android/*.apk

  # Build iOS IPA (macOS only)
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'graalvm-community'
          native-image-job-reports: true
          cache: 'maven'
      
      - name: Build iOS IPA
        run: |
          mvn clean package -Pios -DskipTests
          
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v7
        with:
          name: DailyDash-iOS-IPA
          path: target/gluonfx/ios/*.ipa

  # Create Release with all installers
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*/**/*
          body: |
            # DailyDash Release
            
            Download the installer for your platform:
            - **Windows**: `DailyDash-Windows-Installer.exe` or `.msi`
            - **macOS**: `DailyDash-macOS.dmg`
            - **Linux**: `DailyDash-Linux.deb`
            - **Android**: `DailyDash-Android.apk`
            - **iOS**: `DailyDash-iOS.ipa`
            
            Just download and install - no terminal required!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
