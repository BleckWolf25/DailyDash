name: Build Multi-Platform Installers

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  MAVEN_VERSION: '3.9.6'

jobs:
  # Build Windows EXE installer
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
      
      - name: Install WiX Toolset
        run: |
          $releases = "https://api.github.com/repos/wixtoolset/wix3/releases"
          $url = $(curl -s $releases | ConvertFrom-Json)[0].assets[4].browser_download_url
          curl -L -o wix311.exe "$url"
          .\wix311.exe /install /quiet /norestart
          
      - name: Build Windows EXE
        run: |
          mvn clean package
          mvn jpackage:jpackage -Pwindows
          
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: DailyDash-Windows-Installer
          path: target/dist/*.exe
          
      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: DailyDash-Windows-MSI
          path: target/dist/*.msi

  # Build macOS DMG
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
      
      - name: Build macOS DMG
        run: |
          mvn clean package
          mvn jpackage:jpackage -Pmacos
          
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: DailyDash-macOS-DMG
          path: target/dist/*.dmg

  # Build Linux DEB
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
      
      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot binutils
          
      - name: Build Linux DEB
        run: |
          mvn clean package
          mvn jpackage:jpackage -Plinux
          
      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: DailyDash-Linux-DEB
          path: target/dist/*.deb

  # Build Android APK (requires GraalVM + Android SDK)
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'graalvm-community'
          native-image-job-reports: true
          cache: 'maven'
      
      - name: Build Android APK
        run: |
          mvn clean package -Pandroid
          
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: DailyDash-Android-APK
          path: target/gluonfx/android/*.apk

  # Build iOS IPA (macOS only)
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
      
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'graalvm-community'
          native-image-job-reports: true
          cache: 'maven'
      
      - name: Build iOS IPA
        run: |
          mvn clean package -Pios
          
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: DailyDash-iOS-IPA
          path: target/gluonfx/ios/*.ipa

  # Create Release with all installers
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*/**/*
          body: |
            # DailyDash Release
            
            Download the installer for your platform:
            - **Windows**: `DailyDash-Windows-Installer.exe` or `.msi`
            - **macOS**: `DailyDash-macOS.dmg`
            - **Linux**: `DailyDash-Linux.deb`
            - **Android**: `DailyDash-Android.apk`
            - **iOS**: `DailyDash-iOS.ipa`
            
            Just download and install - no terminal required!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
