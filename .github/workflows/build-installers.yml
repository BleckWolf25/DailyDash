name: Build Multi-Platform Installers

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  MAVEN_VERSION: '3.9.6'

jobs:
  # Build Windows EXE, MSI, and Portable ZIP + Self-Signing
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
      
      - name: Install WiX Toolset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "C:\wix" -Force
          Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip" -OutFile "C:\wix\wix.zip"
          Expand-Archive -Path "C:\wix\wix.zip" -DestinationPath "C:\wix" -Force
          echo "C:\wix" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run Checkstyle
        run: mvn checkstyle:check

      - name: Build Windows EXE
        run: |
          mvn clean package -DskipTests -Pwindows-installer -Djpackage.type=exe
          
      - name: Build Windows MSI
        run: |
          mvn package -DskipTests -Pwindows-installer -Djpackage.type=msi

      - name: Build Windows Portable App-Image
        run: |
          mvn package -DskipTests -Pwindows -Djpackage.type=app-image

      - name: Package Windows Portable ZIP & Self-Sign Artifacts
        shell: pwsh
        run: |
          Compress-Archive -Path "target\dist\DailyDash\*" -DestinationPath "target\dist\DailyDash-Windows-Portable.zip" -Force
          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=DailyDash Self-Signed" -KeyUsage DigitalSignature -FriendlyName "DailyDash Code Signing" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3")
          Get-ChildItem -Path "target\dist" -Include "*.exe","*.msi" -Recurse | ForEach-Object {
            Set-AuthenticodeSignature -FilePath $_.FullName -Certificate $cert
          }
          Export-Certificate -Cert $cert -FilePath "target\dist\DailyDash-Windows-Certificate.cer"

      - name: Upload Windows EXE Installer
        uses: actions/upload-artifact@v7
        with:
          name: DailyDash-Windows-EXE
          path: target/dist/*.exe
          
      - name: Upload Windows MSI Installer
        uses: actions/upload-artifact@v7
        with:
          name: DailyDash-Windows-MSI
          path: target/dist/*.msi

      - name: Upload Windows Portable ZIP & Certificate
        uses: actions/upload-artifact@v7
        with:
          name: DailyDash-Windows-Portable
          path: |
            target/dist/DailyDash-Windows-Portable.zip
            target/dist/DailyDash-Windows-Certificate.cer

  # Build macOS DMG, PKG, and Portable ZIP + Ad-Hoc Signing
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check

      - name: Build macOS DMG
        run: |
          mvn clean package -DskipTests -Pmacos -Djpackage.type=dmg

      - name: Build macOS PKG
        run: |
          mvn package -DskipTests -Pmacos -Djpackage.type=pkg
          
      - name: Build macOS App-Image & Ad-Hoc Sign
        run: |
          mvn package -DskipTests -Pmacos -Djpackage.type=app-image
          codesign --force --deep -s - target/dist/DailyDash.app
          cd target/dist && zip -r DailyDash-macOS-Portable.zip DailyDash.app

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v7
        with:
          name: DailyDash-macOS-DMG
          path: target/dist/*.dmg

      - name: Upload macOS PKG
        uses: actions/upload-artifact@v7
        with:
          name: DailyDash-macOS-PKG
          path: target/dist/*.pkg

      - name: Upload macOS Portable ZIP
        uses: actions/upload-artifact@v7
        with:
          name: DailyDash-macOS-Portable
          path: target/dist/DailyDash-macOS-Portable.zip

  # Build Linux DEB, RPM, AppImage, Portable ZIP/TAR.GZ, PKGBUILD + SHA256 Checksums
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot binutils rpm file libfuse2
          
      - name: Build Linux DEB
        run: |
          mvn clean package -DskipTests -Plinux -Djpackage.type=deb

      - name: Build Linux RPM
        run: |
          mvn package -DskipTests -Plinux -Djpackage.type=rpm

      - name: Build Linux App-Image & Package Universal Formats
        run: |
          mvn package -DskipTests -Plinux -Djpackage.type=app-image
          
          # Build AppImage
          mkdir -p target/dist/AppDir/usr
          cp -r target/dist/DailyDash/* target/dist/AppDir/usr/
          cat << 'EOF' > target/dist/AppDir/AppRun
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/DailyDash" "$@"
          EOF
          chmod +x target/dist/AppDir/AppRun
          cp src/main/resources/images/logo.png target/dist/AppDir/DailyDash.png
          cat << 'EOF' > target/dist/AppDir/DailyDash.desktop
          [Desktop Entry]
          Name=DailyDash
          Exec=DailyDash
          Icon=DailyDash
          Type=Application
          Categories=Office;Utility;
          EOF
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run target/dist/AppDir target/dist/DailyDash-Linux-x86_64.AppImage

          # Package Portable tar.gz & zip
          cd target/dist
          tar -czvf DailyDash-Linux-Portable.tar.gz DailyDash
          zip -r DailyDash-Linux-Portable.zip DailyDash
          cd ../..

          # Create Arch Linux PKGBUILD
          cat << 'EOF' > target/dist/PKGBUILD
          # Maintainer: DailyDash
          pkgname=dailydash
          pkgver=1.0.0
          pkgrel=1
          pkgdesc="A simple, offline, personal Board Task Manager"
          arch=('x86_64')
          url="https://github.com/BleckWolf25/DailyDash"
          license=('MIT')
          depends=('java-runtime>=21')
          source=("DailyDash-Linux-Portable.tar.gz")
          sha256sums=('SKIP')

          package() {
            mkdir -p "$pkgdir/opt/dailydash"
            cp -r "$srcdir/DailyDash/"* "$pkgdir/opt/dailydash/"
            mkdir -p "$pkgdir/usr/bin"
            ln -s /opt/dailydash/bin/DailyDash "$pkgdir/usr/bin/dailydash"
          }
          EOF

          # Generate Checksums
          cd target/dist
          sha256sum *.deb *.rpm *.AppImage *.tar.gz *.zip PKGBUILD > SHA256SUMS
          cd ../..

      - name: Upload Linux Packages & Portable Archives
        uses: actions/upload-artifact@v7
        with:
          name: DailyDash-Linux-Packages
          path: |
            target/dist/*.deb
            target/dist/*.rpm
            target/dist/*.AppImage
            target/dist/DailyDash-Linux-Portable.*
            target/dist/PKGBUILD
            target/dist/SHA256SUMS

  # Build Android APK (requires GraalVM + Android SDK)
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'graalvm-community'
          native-image-job-reports: true
          cache: 'maven'
      
      - name: Build Android APK
        run: |
          mvn clean package -Pandroid -DskipTests
          
      - name: Upload Android APK
        uses: actions/upload-artifact@v7
        with:
          name: DailyDash-Android-APK
          path: target/gluonfx/android/*.apk

  # Build iOS IPA (macOS only)
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'graalvm-community'
          native-image-job-reports: true
          cache: 'maven'
      
      - name: Build iOS IPA
        run: |
          mvn clean package -Pios -DskipTests
          
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v7
        with:
          name: DailyDash-iOS-IPA
          path: target/gluonfx/ios/*.ipa

  # Create Release with all installers
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-macos, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*/**/*
          body: |
            # DailyDash Release
            
            Download the installer or package for your platform:
            
            ### Windows (Self-Signed)
            - **Installer (EXE)**: `DailyDash-*.exe`
            - **Installer (MSI)**: `DailyDash-*.msi`
            - **Portable ZIP**: `DailyDash-Windows-Portable.zip`
            - **Certificate**: `DailyDash-Windows-Certificate.cer`
            
            ### macOS (Ad-Hoc Signed)
            - **Disk Image (DMG)**: `DailyDash-*.dmg`
            - **Installer (PKG)**: `DailyDash-*.pkg`
            - **Portable ZIP**: `DailyDash-macOS-Portable.zip`
            
            ### Linux
            - **Debian / Ubuntu (DEB)**: `DailyDash-*.deb`
            - **Fedora / RHEL / openSUSE (RPM)**: `DailyDash-*.rpm`
            - **Universal AppImage**: `DailyDash-Linux-x86_64.AppImage`
            - **Portable Archives**: `DailyDash-Linux-Portable.tar.gz` & `.zip`
            - **Arch Linux**: `PKGBUILD`
            - **Checksums**: `SHA256SUMS`
            
            ### Mobile (GraalVM Native)
            - **Android (APK)**: `DailyDash.apk`
            - **iOS (IPA)**: `DailyDash.ipa`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

